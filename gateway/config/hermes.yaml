# ============================================================
# Hermes Agent 配置文件
# 云端：DeepSeek-V4-Flash（日常）+ DeepSeek-V4-Pro（深度）
# 本地兜底：Windows llama.cpp + Qwen3.6-35B
# Embedding/Rerank：容器内服务
# ============================================================

# --- 1. 模型提供商配置 ---
providers:
  # 云端 DeepSeek
  deepseek:
    base_url: https://api.deepseek.com/v1
    api_key: ${DEEPSEEK_API_KEY}

  # 本地 LLM（Windows 宿主机，仅 LLM 服务）
  local_llm:
    base_url: http://host.docker.internal:8000/v1   # Windows 上的 llama.cpp
    api_key: ${DEEPSEEK_API_KEY}
    # llama.cpp 不需要 API Key

  # 容器内 Embedding 服务
  local_embedding:
    base_url: http://embedding-llama:8000/v1   # 容器间通信用服务名
    # 或使用宿主机端口: http://localhost:8001/v1

  # 容器内 Rerank 服务
  local_rerank:
    base_url: http://reranker-llama:8000/v1    # 容器间通信用服务名

# --- 2. 模型定义 ---
models:
  # 云端日常模型
  deepseek/deepseek-v4-flash:
    provider: deepseek
    model: deepseek-v4-flash
    context_length: 1048576
    temperature: 0.7
    max_tokens: 8192
    description: "日常对话、简单任务"

  # 云端深度分析模型
  deepseek/deepseek-v4-pro:
    provider: deepseek
    model: deepseek-v4-pro
    context_length: 1048576
    temperature: 0.3
    max_tokens: 8192
    thinking:
      type: enabled
      budget_tokens: 4096
    description: "复杂推理、代码审查"

  # 本地兜底模型（Windows llama.cpp）
  local/qwen3.6-35b:
    provider: local_llm
    model: qwen3.6-35b
    context_length: 65536
    temperature: 0.7
    max_tokens: 4096
    description: "本地 Qwen3.6-35B，断网时使用"

# --- 3. 默认模型 ---
default_model: deepseek/deepseek-v4-flash

# --- 4. 向量化配置（使用容器内的 Embedding 服务）---
embeddings:
  provider: local_embedding
  model: bge-large-zh
  base_url: http://embedding-llama:8000/v1
  embedding_only: true
  dimension: 1024
  # 或使用端口映射: http://localhost:8001/v1

# --- 5. Rerank 配置（使用容器内的 Rerank 服务）---
rerank:
  provider: local_rerank
  model: bge-reranker
  base_url: http://reranker-llama:8000/v1
  top_n: 5
  # 或使用端口映射: http://localhost:8002/v1

# --- 6. 智能路由规则 ---
routing:
  - name: "simple_tasks"
    priority: 10
    match:
      keywords:
        - 总结
        - 翻译
        - 分类
        - 简单
        - 批量
        - 你好
        - 帮助
    target: deepseek/deepseek-v4-flash

  - name: "deep_analysis"
    priority: 10
    match:
      keywords:
        - 深度分析
        - 推理
        - 重构
        - 调试
        - 优化
        - 架构
        - 代码审查
    target: deepseek/deepseek-v4-pro

  - name: "coding_tasks"
    priority: 9
    match:
      keywords:
        - 写代码
        - 生成
        - 脚本
        - 程序
        - 实现
    target: deepseek/deepseek-v4-pro

  - name: "local_fallback"
    priority: 1
    match:
      keywords:
        - /local
        - 本地模型
        - 离线
        - 断网
    target: local/qwen3.6-35b

# --- 7. Agent 配置 ---
agent:
  max_iterations: 10
  timeout: 120
  memory:
    enabled: true
    provider: qdrant
    collection: hermes_memory
    vector_db:
      host: qdrant
      port: 6333
      api_key: dummy  # ← 加上这一行


# --- 8. 工具配置 ---
tools:
  terminal:
    backend: ssh
    ssh_host: host.docker.internal
    ssh_user: root
    ssh_key_path: /root/.ssh/id_rsa_hermes
    timeout: 180

web:
  search_backend: cascading
  extract_backend: firecrawl
  cascading_search:
    backends:
      - provider: firecrawl
      - provider: tavily
      - provider: searxng
        base_url: http://searxng:4000

# 知识库配置
knowledge_base:
  enabled: true
  storage_backend: "qdrant"
  qdrant:
    host: qdrant
    port: 6333
    collection_name: hermes_knowledge
    vector_size: 1024
    # 启用混合检索
    hybrid_search:
      enabled: true
      alpha: 0.5  # 语义vs关键词权重 (0=纯关键词, 1=纯语义)

  # 多知识源配置
  sources:
    - name: "obsidian_vault"
      path: /knowledge_base/obsidian
      enabled: true
      auto_sync: true
      file_extensions: [".md"]
      exclude_patterns: [".obsidian/", ".trash/", "*/Template/*"]

    - name: "documents"
      path: /workspace/documents
      enabled: true
      auto_sync: false

  # 检索配置
  retrieval:
    top_k: 5
    rerank:
      enabled: true
      api_url: http://reranker-llama:8000/rerank
    score_threshold: 0.35  # 相似度阈值

# API Server 配置（Coze 调用）
api_server:
  enabled: true
  host: 0.0.0.0
  port: 8000
  api_key: ${API_SERVER_KEY}

  # 允许跨域（Coze 可能在前端调用）
  cors:
    allowed_origins: ["*"]
    allowed_methods: ["GET", "POST", "PUT", "DELETE"]
    allowed_headers: ["*"]

# 搜索配置（SearXNG 已配置）
search:
  enabled: true
  engine: "searxng"
  searxng_url: "http://searxng:4000/search?format=json"
  max_results: 10