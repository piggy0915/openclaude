name: qdrant
version: 1.0.0
description: "Qdrant vector database memory provider — semantic search and persistent memory with Qdrant + local embedding service"
pip_dependencies:
  - qdrant-client>=1.12.0
requires_env:
  - QDRANT_HOST
  - QDRANT_PORT
  - EMBEDDING_BASE_URL
  - EMBEDDING_MODEL
hooks:
  - on_session_end
  - on_memory_write
